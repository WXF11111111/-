<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色详情 - 卡厄斯工坊</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <!-- Character Info -->
    <section class="card character-header">

        <img id="charImage" class="avatar" src="" alt="">

        <div class="character-meta">
            <h2 id="charName"></h2>
            <p id="charInfo"></p>
        </div>

    </section>

    <!-- Fragment Section -->
    <section class="card">

        <h3 class="section-title">记忆碎片数据</h3>

        <div id="fragmentStatus" class="fragment-list"></div>

        <button id="addFragmentBtn" class="btn primary full-width">
            录入碎片数据
        </button>

        <button class="btn secondary full-width mt-12"
                onclick="calculateTotalScore()">
            汇总计算6个碎片评分
        </button>

    </section>

    <!-- Result -->
    <section id="scoreResult" class="card hidden">

        <h3 class="section-title">评分结果</h3>

        <div class="result-center">

            <div class="score" id="totalScore">0</div>

            <div class="rate" id="graduationRate">毕业率：0%</div>

        </div>

    </section>

</div>

<!-- Bottom Nav -->
<nav class="nav-bar">

    <a href="index.html" class="nav-item" data-page="index">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>首页</span>
    </a>

    <a href="characters.html" class="nav-item active" data-page="characters">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>角色柜</span>
    </a>

</nav>

<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/character-detail.js"></script>

</body>
</html>
