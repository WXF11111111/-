<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色详情 - 卡厄斯工坊</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/share-card.css">
</head>
<body>
    <!-- 动态粒子背景 -->
    <div class="bg-particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 25%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="left: 55%; animation-delay: 9s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 15s;"></div>
    </div>

    <div class="container">
        <div class="card" style="text-align: center; padding: 32px 24px;">
            <div style="width: 120px; height: 120px; margin: 0 auto 16px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent); box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);">
                <img id="charImage" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <h2 id="charName" style="font-size: 24px; font-weight: 700; margin-bottom: 8px;" class="gradient-text"></h2>
            <p id="charInfo" style="color: var(--text-secondary); font-size: 14px;"></p>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-size: 16px; font-weight: 600;">碎片状态</h3>
                <button class="btn btn-secondary" id="addFragmentBtn" style="padding: 8px 16px; font-size: 12px; cursor: pointer; position: relative; z-index: 10;">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width: 16px; height: 16px; margin-right: 4px;">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    添加碎片
                </button>
            </div>
            <div id="fragmentStatus">
                <!-- 碎片列表 -->
            </div>
        </div>

        <div class="card card-glow">
            <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">评分汇总</h3>
            
            <!-- 角色类型选择 -->
            <div style="margin-bottom: 16px;">
                <label for="charTypeSelect" style="font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: block;">角色类型</label>
                <select id="charTypeSelect" style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff;">
                    <option value="DPS">攻击输出</option>
                    <option value="DEF">防御输出</option>
                    <option value="SUPPORT">治疗辅助</option>
                </select>
            </div>
            
            <!-- 评分结果 -->
            <div id="scoreResult" style="display: none; margin-bottom: 16px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span style="color: var(--text-secondary);">综合评分</span>
                    <span id="totalScore" style="font-size: 28px; font-weight: 700; color: var(--accent);">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span style="color: var(--text-secondary);">平均分</span>
                    <span id="avgScore" style="font-size: 20px; font-weight: 600; color: #fff;">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span style="color: var(--text-secondary);">毕业度</span>
                    <span id="graduationRate" style="font-size: 18px; font-weight: 600;">0%</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--text-secondary);">毕业状态</span>
                    <span id="graduationStatus" style="font-size: 16px; font-weight: 600; padding: 4px 12px; border-radius: 20px;"></span>
                </div>
            </div>
            
            <!-- 养成建议 -->
            <div id="suggestions" style="display: none; margin-bottom: 16px;">
                <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary);">养成建议</h4>
                <div id="suggestionList"></div>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="flex: 1;" onclick="calculateTotalScore()">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width: 18px; height: 18px; margin-right: 8px;">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l6.59-6.59L20 8l-8 8z"/>
                    </svg>
                    计算总评分
                </button>
                <button class="btn btn-primary" style="flex: 1;" onclick="ShareCard.showShareModal(currentCharacter)">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width: 18px; height: 18px; margin-right: 8px;">
                        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-2.48 2.06-4.46 4.55-4.51 2.47-.05 4.44 2.02 4.5 4.49l-5.13 3.85c.54.57 1.25.9 2.07.9z"/>
                    </svg>
                    分享卡片
                </button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item" data-page="index">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>首页</span>
        </a>
        <a href="characters.html" class="nav-item active" data-page="characters">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>角色柜</span>
        </a>
    </nav>

    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/artifact-scoring.js"></script>
    <script src="js/character-detail.js"></script>
    <script src="js/share-card.js"></script>
</body>
</html>
