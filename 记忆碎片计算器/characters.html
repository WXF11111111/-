<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色柜 - 卡厄斯工坊</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 动态粒子背景 -->
    <div class="bg-particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 25%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="left: 55%; animation-delay: 9s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 15s;"></div>
    </div>

    <div class="container">
        <h1 class="page-title">角色柜</h1>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-size: 16px; font-weight: 600;">我的角色</h3>
                <button class="btn" style="padding: 10px 20px; font-size: 13px;" onclick="showModal('createCharacterModal')">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width: 18px; height: 18px; margin-right: 6px;">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    新建角色
                </button>
            </div>
            
            <div id="myCharacters" class="character-grid">
                <div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-muted);">
                    暂无角色，点击右上角新建
                </div>
            </div>

            <!-- 图片占位符样式 -->
            <style>
                .lazy-image {
                    background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(153, 51, 255, 0.1) 100%);
                    min-height: 80px;
                }
            </style>
        </div>
    </div>

    <!-- 新建角色弹窗 -->
    <div id="createCharacterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>新建角色</h2>
                <span class="close-btn" onclick="hideModal('createCharacterModal')">×</span>
            </div>
            
            <div class="input-group">
                <label for="characterSelect">选择角色</label>
                <select id="characterSelect">
                    <option value="">请选择角色</option>
                </select>
            </div>

            <div class="input-group">
                <label for="selfLevel">自我意识等级</label>
                <select id="selfLevel">
                    <option value="1">Self 1</option>
                    <option value="2">Self 2</option>
                    <option value="3">Self 3</option>
                    <option value="4">Self 4</option>
                    <option value="5">Self 5</option>
                    <option value="6">Self 6</option>
                </select>
            </div>

            <div class="input-group">
                <label for="charLevel">角色等级</label>
                <select id="charLevel">
                    <option value="1">Lv.1</option>
                    <option value="20">Lv.20</option>
                    <option value="40">Lv.40</option>
                    <option value="50">Lv.50</option>
                    <option value="60" selected>Lv.60</option>
                </select>
            </div>

            <button class="btn" style="width: 100%; margin-top: 8px;" onclick="createCharacter()">
                确认创建
            </button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item" data-page="index">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>首页</span>
        </a>
        <a href="characters.html" class="nav-item active" data-page="characters">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>角色柜</span>
        </a>
        <a href="ranking.html" class="nav-item" data-page="ranking">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <span>排行榜</span>
        </a>
    </nav>

    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/characters.js"></script>
</body>
</html>
