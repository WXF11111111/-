<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - 卡厄斯工坊</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 排行榜专用样式 */
        .ranking-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .ranking-header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .ranking-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #0066ff, #9933ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .ranking-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .rank-card {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        
        .rank-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        
        .rank-card:first-child {
            border-color: #ffd700;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(20, 20, 30, 0.8));
        }
        
        .rank-card:nth-child(2) {
            border-color: #c0c0c0;
        }
        
        .rank-card:nth-child(3) {
            border-color: #cd7f32;
        }
        
        .rank-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .rank-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            margin-right: 12px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .rank-card:first-child .rank-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
        }
        
        .rank-card:nth-child(2) .rank-badge {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #000;
        }
        
        .rank-card:nth-child(3) .rank-badge {
            background: linear-gradient(135deg, #cd7f32, #b06020);
            color: #fff;
        }
        
        .char-info {
            flex: 1;
        }
        
        .char-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .char-detail {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .rank-stats {
            display: flex;
            justify-content: space-around;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .rank-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: right;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 16px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--border);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }
        
        .nav-item.active {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- 动态粒子背景 -->
    <div class="bg-particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 25%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="left: 55%; animation-delay: 9s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 15s;"></div>
    </div>

    <div class="ranking-container">
        <div class="ranking-header">
            <h1 class="ranking-title">🏆 排行榜</h1>
            <p class="ranking-subtitle">本地排行榜 · 记录你的最强角色</p>
        </div>
        
        <div id="rankingList">
            <!-- 排行榜列表将在这里动态生成 -->
        </div>
        
        <button class="btn-primary" onclick="refreshRanking()">
            🔄 刷新排行榜
        </button>
    </div>
