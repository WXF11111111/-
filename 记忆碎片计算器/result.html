<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算结果 - 卡厄斯工坊</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="result-page">

    <div class="result-wrapper">

        <!-- Header -->
        <header class="result-header">
            <h1>计算结果</h1>
        </header>

        <!-- Main Card -->
        <section class="result-card">

            <div class="result-item">
                <span class="label">总分</span>
                <span class="value score" id="finalScore">0</span>
            </div>

            <div class="result-item">
                <span class="label">评级</span>
                <span class="value rank" id="finalRank">--</span>
            </div>

            <div class="result-item">
                <span class="label">毕业率</span>
                <span class="value rate" id="finalRate">0.0%</span>
            </div>

        </section>

        <!-- Actions -->
        <section class="action-bar">

            <button class="btn primary" onclick="goBack()">
                返回计算
            </button>

            <button class="btn secondary" onclick="saveResult()">
                保存结果
            </button>

        </section>

    </div>

    <script src="js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', initResultPage);

        function initResultPage() {
            const result = JSON.parse(localStorage.getItem('lastResult') || '{}');

            if (!result || !result.totalScore) return;

            updateUI(result);
            setBackground();
        }

        function updateUI(result) {
            document.getElementById('finalScore').textContent = result.totalScore;
            document.getElementById('finalRank').textContent = result.rank;
            document.getElementById('finalRate').textContent = result.graduationRate + '%';
        }

        function setBackground() {
            document.body.style.backgroundImage =
                "url('background/维若妮卡.png')";
        }

        function goBack() {
            window.history.back();
        }

        function saveResult() {
            const node = document.querySelector('.result-card');

            html2canvas(node).then(canvas => {
                const link = document.createElement('a');
                link.download = '碎片计算结果.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>

</body>
</html>
