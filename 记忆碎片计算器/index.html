<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡厄斯工坊</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1 style="font-size: 28px; margin: 20px 0; color: var(--accent);">卡厄斯工坊</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
            <a href="characters.html" class="card" style="text-decoration: none; color: inherit;">
                <div style="font-size: 48px; margin-bottom: 8px;">👤</div>
                <h3 style="font-size: 18px; margin-bottom: 4px;">角色管理</h3>
                <p style="color: var(--text-secondary); font-size: 14px;">新建/查看角色数据</p>
            </a>
            <a href="calculator.html" class="card" style="text-decoration: none; color: inherit;">
                <div style="font-size: 48px; margin-bottom: 8px;">📊</div>
                <h3 style="font-size: 18px; margin-bottom: 4px;">碎片评分</h3>
                <p style="color: var(--text-secondary); font-size: 14px;">快速计算碎片评分</p>
            </a>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 12px;">使用说明</h3>
            <ul style="color: var(--text-secondary); font-size: 14px; line-height: 1.6; padding-left: 20px;">
                <li>1. 先在角色管理中新建你的角色</li>
                <li>2. 为角色录入记忆碎片数据</li>
                <li>3. 系统自动计算评分和毕业率</li>
                <li>4. 所有数据本地存储，无需联网</li>
            </ul>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active" data-page="index">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>首页</span>
        </a>
        <a href="characters.html" class="nav-item" data-page="characters">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>角色柜</span>
        </a>
    </nav>

    <script src="js/common.js"></script>
    <script>
        setActiveNav('index');
    </script>

</html>
