<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碎片评分计算器 - 卡厄斯工坊</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/calculator.css">
</head>

<body>

<div class="calculator-container">

    <!-- Header -->
    <header class="page-header">
        <h1>记忆碎片评分</h1>
    </header>

    <!-- Character Info -->
    <section id="charInfoCard" class="card hidden">

        <div class="char-info">
            <img id="calcCharImage" class="avatar-small" src="" alt="">
            <div>
                <div id="calcCharName" class="char-name"></div>
                <div id="calcCharDesc" class="char-desc"></div>
            </div>
        </div>

    </section>

    <!-- Part Tabs -->
    <section class="part-tabs">

        <button class="tab active" data-part="impact">冲击</button>
        <button class="tab" data-part="suppress">压抑</button>
        <button class="tab" data-part="deny">否定</button>
        <button class="tab" data-part="ideal">理想</button>
        <button class="tab" data-part="desire">渴望</button>
        <button class="tab" data-part="imagine">想像</button>

    </section>

    <!-- Main Attribute -->
    <section class="card">

        <h3>主属性</h3>

        <div class="form-group">
            <label>强化等级</label>
            <select id="levelSelect"></select>
        </div>

        <div class="form-group">
            <label>主属性类型</label>
            <select id="mainAttrSelect"></select>
        </div>

        <div class="form-group">
            <label>主属性数值</label>
            <input type="number" id="mainAttrValue" placeholder="输入数值">
        </div>

    </section>

    <!-- Sub Attributes -->
    <section class="card">

        <h3>副词条</h3>

        <div id="subAttrContainer"></div>

    </section>

    <!-- Actions -->
    <section class="action-bar">

        <button class="btn primary full-width" onclick="calculateScore()">
            计算并保存
        </button>

    </section>

    <!-- Result -->
    <section class="result-display hidden" id="resultDisplay">

        <div class="score-value" id="scoreValue">0</div>
        <div class="score-rank" id="scoreRank">--</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats-row">

            <div>
                <div class="stat-value" id="graduationRate">0%</div>
                <div class="stat-label">毕业率</div>
            </div>

            <div>
                <div class="stat-value" id="totalPoints">0</div>
                <div class="stat-label">总点数</div>
            </div>

        </div>

    </section>

</div>

<!-- Bottom Nav -->
<nav class="nav-bar">

    <a href="index.html" class="nav-item" data-page="index">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>首页</span>
    </a>

    <a href="characters.html" class="nav-item active" data-page="characters">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>角色柜</span>
    </a>

</nav>

<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/calculator.js"></script>

</body>
</html>
